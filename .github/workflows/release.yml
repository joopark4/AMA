name: Release

# NOTE: 정식 배포는 로컬에서 `npm run release:local`로 진행한다.
# 이 워크플로우는 수동 실행(workflow_dispatch) 전용으로 보존 — 향후 CI 빌드를
# 활성화할 때 참고용. 자동 trigger를 두면 빌드 자산(VRM/FBX 등 비공개)이 없어
# 실패하므로 의도적으로 disable.
on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.9.9)'
        required: true

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest]

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install frontend dependencies
        run: npm ci

      - name: Install whisper-cli (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install whisper-cpp
          WHISPER_PREFIX="$(brew --prefix whisper-cpp)"
          echo "WHISPER_CPP_LIB_DIR=${WHISPER_PREFIX}/libexec/lib" >> $GITHUB_ENV
          echo "WHISPER_CLI_PATH=${WHISPER_PREFIX}/bin/whisper-cli" >> $GITHUB_ENV

      - name: Prepare assets (runtime only, no models)
        run: |
          PREPARE_PUBLIC_MODELS=0 \
          PREPARE_BUNDLE_RESOURCES=1 \
          PREPARE_DOWNLOAD_WHISPER=0 \
          PREPARE_DOWNLOAD_SUPERTONIC=0 \
          npm run prepare:assets

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'AMA v__VERSION__'
          includeUpdaterJson: true
          releaseBody: 'See the assets to download and install this version.'
          releaseDraft: true
          prerelease: false
          args: --target universal-apple-darwin
